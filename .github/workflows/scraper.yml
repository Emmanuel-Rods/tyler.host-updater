name: Daily Scraper Updater

on:
  # 1. Runs automatically every day at Midnight (00:00 UTC)
  schedule:
    - cron: "0 0 * * *"

  # 2. Allows you to trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  run-scraper:
    # Spins up a fresh Ubuntu server with 14GB of storage for your temp files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # You can change this to 18 if your local Node is older

      - name: Install dependencies
        run: npm install

      - name: Run daily scraper
        env:
          # Pulls the secrets you set in Step 1 and passes them as environment variables
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TABLE: ${{ secrets.TABLE }}
        run: node daily.js
